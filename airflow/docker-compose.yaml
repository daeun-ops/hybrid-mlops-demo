x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./dags:/opt/airflow/dags
    - ./dags:/opt/airflow/dags
  user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  airflow-init:
    !!merge <<: *airflow-common
    command: ["bash", "-c", "airflow db migrate && airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com || true"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  airflow-webserver:
    !!merge <<: *airflow-common
    command: webserver --port 8080 --hostname 0.0.0.0
    ports:
      - "8080:8080"
    healthcheck:
      test: [CMD-SHELL, "python - <<PY\nimport urllib.request,sys\nu=\"http://localhost:8080/api/v1/health\"\ntry:\n  r=urllib.request.urlopen(u,timeout=5)\n  sys.exit(0 if r.status==200 else 1)\nexcept Exception:\n  sys.exit(1)\nPY"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
  airflow-scheduler:
    !!merge <<: *airflow-common
    command: scheduler
    restart: always
